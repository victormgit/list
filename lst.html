<!DOCTYPE html>
<title>lst</title>
<link rel="stylesheet" href="style.css">
<body><script src="script.js"></script><script>

let l2 = 0;
let l3 = 0;
let l4 = 0;

for(let i = 1; i < db.length; i++) {
  if(l2 < db[i][2].length) {l2 = db[i][2].length;}
  if(l3 < db[i][3].length) {l3 = db[i][3].length;}
  if(l4 < db[i][4].length) {l4 = db[i][4].length;}
}

const gq = "https://www.duckduckgo.com/search?q="; // udm=2&
const yq = "https://www.youtube.com/results?search_query=";

let lt = "";
let ct = "";

for(let i = 1; i < db.length; i++) {
  let d = [,0,"","","",""];
  for(let j = 1; j < d.length; j++) {d[j] = db[i][j];}
  
  v2 = "&nbsp".repeat(l2-d[2].length);
  v3 = "&nbsp".repeat(l3-d[3].length);
  v4 = "&nbsp".repeat(l4-d[4].length);

  lt += 
    `],[,${d[1]}` +
      `,"${d[2]}"${v2}` +
      `,"${d[3]}"${v3}` +
      `,"${d[4]}"${v4}` +
      `,"${d[5]}"<br>`;

  w3 = d[3].replaceAll("&","%26");
  w4 = d[4].replaceAll("&","%26");

  if (d[2] === "Arcade")             {x = `${w4} ${d[1]} ${d[2]}`; y = `${x} Walkthrough`;} // TAS
  if (d[2] === "Sega Master System") {x = `${w4} (${d[2]})`;         y = `${x} Walkthrough`;} // Walkthrough
  if (d[2] === "NES")                {x = `${w4} ${d[2]}`;         y = `${x} Walkthrough`;} // Speedrun
  if (d[2] === "PC")                 {x = `${w4} ${d[1]} ${d[2]}`; y = `${x} Walkthrough`;}
  if (d[2] === "Song")               {x = `${w3} - ${w4}`;         y = `${x} (Instrumental)`;} // (Instrumental)
  // Wikipedia ROM YouTube HD Trailer

  ct += `
    <div class="cd">
      <a href="${yq}${y}"           target="_blank"><img src="${d[5]}"></a>
      <a href="${gq}${x} Wikipedia" target="_blank">
        <div class="tx">
          <span>${d[1]}</span><br>
             <b>${d[4]}</b><br>
                ${d[3]}
        </div>
      </a>
    </div>
  `;
}
document.body.innerHTML = ct;
</script></body>
